apiVersion: apps/v1
kind: Deployment
metadata:
  name: recruitment-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recruitment-app
  template:
    metadata:
      labels:
        app: recruitment-app
    spec:
      containers:
      - name: recruitment-app
        image: <dockerhub-username>/recruitment-app:latest
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: recruitment-config
---
apiVersion: v1
kind: Service
metadata:
  name: recruitment-service
spec:
  selector:
    app: recruitment-app
  ports:
  - port: 3000
    targetPort: 3000
  type: NodePort
